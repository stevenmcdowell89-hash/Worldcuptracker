<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#2A2597"/><stop offset="0.55" stop-color="#4B45E0"/><stop offset="1" stop-color="#6F69FF"/>
    </linearGradient>
    <radialGradient id="spark" cx="0.78" cy="0.32" r="0.6">
      <stop offset="0" stop-color="#FBB034" stop-opacity="0.45"/><stop offset="1" stop-color="#FBB034" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#FBB034" flood-opacity="0.6"/>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#140F58" flood-opacity="0.5"/>
    </filter>
    <clipPath id="belowLine"><polygon points="0.0,434.2 512.0,148.1 512,512 0,512"/></clipPath>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect width="512" height="512" rx="116" fill="url(#spark)"/>

  <!-- signature: the rising amber cut line, glowing -->
  <line x1="54" y1="404" x2="462" y2="176" stroke="#FBB034" stroke-width="12"
        stroke-linecap="round" stroke-dasharray="2 24" filter="url(#glow)"/>

  <!-- 26: white above the cut line, amber below it (the line slices the score) -->
  <g filter="url(#soft)">
    <text x="208" y="352" text-anchor="middle" fill="#FFFFFF"
          font-family="'Bricolage Grotesque','Archivo','Helvetica Neue',Arial,sans-serif"
          font-weight="800" font-size="250" letter-spacing="-14">26</text>
  </g>
  <g clip-path="url(#belowLine)">
    <text x="208" y="352" text-anchor="middle" fill="#FBB034"
          font-family="'Bricolage Grotesque','Archivo','Helvetica Neue',Arial,sans-serif"
          font-weight="800" font-size="250" letter-spacing="-14">26</text>
  </g>

  <!-- football launching off the top of the line, with a motion trail -->
  <line x1="369.8" y1="197.5" x2="319.2" y2="225.8"
     stroke="#FBB034" stroke-width="9" stroke-linecap="round" opacity="0.9"/>
  <line x1="382.4" y1="207.7" x2="331.8" y2="236.0"
     stroke="#FBB034" stroke-width="7" stroke-linecap="round" opacity="0.55"/>
  <line x1="367.8" y1="181.5" x2="317.1" y2="209.8"
     stroke="#FBB034" stroke-width="7" stroke-linecap="round" opacity="0.55"/>
  <ellipse cx="410" cy="219.1" rx="29.6" ry="6.66" fill="#140F58" opacity="0.4"/>
  <g>
    <circle cx="410" cy="175.05882352941177" r="37" fill="#FFFFFF"/>
    <clipPath id="bclip"><circle cx="410" cy="175.05882352941177" r="37"/></clipPath>
    <g clip-path="url(#bclip)">
      <g fill="#2A2597"><polygon points="410.0,159.5 424.8,170.3 419.1,187.6 400.9,187.6 395.2,170.3"/><polygon points="410.0,146.9 401.6,140.8 404.8,130.9 415.2,130.9 418.4,140.8"/><polygon points="436.7,166.4 440.0,156.4 450.4,156.4 453.6,166.4 445.2,172.5"/><polygon points="426.5,197.8 437.0,197.8 440.2,207.7 431.7,213.9 423.3,207.7"/><polygon points="393.5,197.8 396.7,207.7 388.3,213.9 379.8,207.7 383.0,197.8"/><polygon points="383.3,166.4 374.8,172.5 366.4,166.4 369.6,156.4 380.0,156.4"/></g>
      <path d="M 410.0,159.5 L 410.0,145.5 M 424.8,170.3 L 438.2,165.9 M 419.1,187.6 L 427.4,199.0 M 400.9,187.6 L 392.6,199.0 M 395.2,170.3 L 381.8,165.9" fill="none" stroke="#2A2597" stroke-width="4.4399999999999995" stroke-linecap="round"/>
    </g>
    <circle cx="410" cy="175.05882352941177" r="37" fill="none" stroke="#16115E" stroke-opacity="0.14" stroke-width="2"/>
  </g>
</svg>
