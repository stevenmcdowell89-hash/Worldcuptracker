<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5650F0"/><stop offset="1" stop-color="#322CB0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-60%" width="140%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#F7A52B" flood-opacity="0.55"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#15116A" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- signature: amber dashed cut line, behind the numerals -->
  <line x1="70" y1="296" x2="442" y2="296" stroke="#F7A52B" stroke-width="11"
        stroke-linecap="round" stroke-dasharray="2 26" filter="url(#glow)"/>

  <!-- the lean 26, drawn over the cut line so the line reads as passing behind it -->
  <g filter="url(#soft)">
    <text x="224" y="350" text-anchor="middle" fill="#FFFFFF"
          font-family="'Bricolage Grotesque','Archivo','Helvetica Neue',Arial,sans-serif"
          font-weight="700" font-size="240" letter-spacing="-12">26</text>
  </g>

  <!-- football resting on the cut line, to the right -->
  
  <g>
    <ellipse cx="392" cy="344" rx="32.3" ry="7.6000000000000005" fill="#16115E" opacity="0.45"/>
    <circle cx="392" cy="296" r="38" fill="#FFFFFF"/>
    <clipPath id="b1"><circle cx="392" cy="296" r="38"/></clipPath>
    <g clip-path="url(#b1)">
      <g fill="#2A2597"><polygon points="392.0,280.0 407.2,291.1 401.4,308.9 382.6,308.9 376.8,291.1"/><polygon points="392.0,267.1 383.3,260.8 386.6,250.6 397.4,250.6 400.7,260.8"/><polygon points="419.5,287.1 422.8,276.9 433.5,276.9 436.8,287.1 428.1,293.4"/><polygon points="409.0,319.4 419.7,319.4 423.0,329.6 414.3,335.9 405.7,329.6"/><polygon points="375.0,319.4 378.3,329.6 369.7,335.9 361.0,329.6 364.3,319.4"/><polygon points="364.5,287.1 355.9,293.4 347.2,287.1 350.5,276.9 361.2,276.9"/></g>
      <g fill="none" stroke="#2A2597" stroke-width="4.94" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 392.0,280.0 L 392.0,266.4 M 407.2,291.1 L 420.2,286.8 M 401.4,308.9 L 409.4,320.0 M 382.6,308.9 L 374.6,320.0 M 376.8,291.1 L 363.8,286.8"/><path d="M 392.0,258.0 L 428.1,284.3 L 414.3,326.7 L 369.7,326.7 L 355.9,284.3 Z" stroke-width="3.8000000000000003"/>
      </g>
    </g>
    <circle cx="392" cy="296" r="38" fill="none" stroke="#16115E" stroke-opacity="0.12" stroke-width="2"/>
  </g>
</svg>
