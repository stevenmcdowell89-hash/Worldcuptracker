<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#34369C"/><stop offset="1" stop-color="#23246F"/>
    </linearGradient>
    <clipPath id="card"><rect width="512" height="512" rx="116"/></clipPath>
    <clipPath id="stripeTri"><polygon points="0,0 512,0 512,512"/></clipPath>
    <filter id="lift" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#16164F" flood-opacity="0.55"/>
    </filter>
  </defs>

  <g clip-path="url(#card)">
    <!-- blue field (lower-left) -->
    <rect width="512" height="512" fill="url(#blue)"/>
    <!-- red/white stripes (upper-right triangle) -->
    <g clip-path="url(#stripeTri)"><rect x="0" y="0" width="512" height="66" fill="#C8102E"/><rect x="0" y="66" width="512" height="66" fill="#FFFFFF"/><rect x="0" y="132" width="512" height="66" fill="#C8102E"/><rect x="0" y="198" width="512" height="66" fill="#FFFFFF"/><rect x="0" y="264" width="512" height="66" fill="#C8102E"/><rect x="0" y="330" width="512" height="66" fill="#FFFFFF"/><rect x="0" y="396" width="512" height="66" fill="#C8102E"/><rect x="0" y="462" width="512" height="66" fill="#FFFFFF"/></g>
    <!-- bold diagonal seam through -->
    <line x1="-10" y1="-10" x2="522" y2="522" stroke="#FFFFFF" stroke-width="16"/>
    <line x1="-10" y1="-10" x2="522" y2="522" stroke="#16164F" stroke-opacity="0.18" stroke-width="20"/>
    <line x1="-10" y1="-10" x2="522" y2="522" stroke="#FFFFFF" stroke-width="16"/>

    <!-- white star on the blue half -->
    <polygon points="150.0,136.0 163.5,177.5 207.1,177.5 171.8,203.1 185.3,244.5 150.0,218.9 114.7,244.5 128.2,203.1 92.9,177.5 136.5,177.5" fill="#FFFFFF" filter="url(#lift)"/>

    <!-- heavy, angled 26 anchored toward the bottom -->
    <g filter="url(#lift)">
      <text x="250" y="380" text-anchor="middle" transform="rotate(15 250 360)"
            font-family="'Bricolage Grotesque','Archivo Black','Helvetica Neue',Arial,sans-serif"
            font-weight="900" font-size="208" letter-spacing="-10"
            fill="#FFFFFF" stroke="#16164F" stroke-width="5" paint-order="stroke">26</text>
    </g>

    <!-- football, top right on the stripes -->
    <g>
    <ellipse cx="372" cy="193" rx="31.45" ry="6.66" fill="#16164F" opacity="0.35"/>
    <circle cx="372" cy="150" r="37" fill="#FFFFFF"/>
    <clipPath id="bclip"><circle cx="372" cy="150" r="37"/></clipPath>
    <g clip-path="url(#bclip)">
      <g fill="#16164F"><polygon points="372.0,134.5 386.8,145.2 381.1,162.6 362.9,162.6 357.2,145.2"/><polygon points="372.0,121.9 363.6,115.7 366.8,105.8 377.2,105.8 380.4,115.7"/><polygon points="398.7,141.3 402.0,131.4 412.4,131.4 415.6,141.3 407.2,147.4"/><polygon points="388.5,172.7 399.0,172.7 402.2,182.7 393.7,188.8 385.3,182.7"/><polygon points="355.5,172.7 358.7,182.7 350.3,188.8 341.8,182.7 345.0,172.7"/><polygon points="345.3,141.3 336.8,147.4 328.4,141.3 331.6,131.4 342.0,131.4"/></g>
      <path d="M 372.0,134.5 L 372.0,120.4 M 386.8,145.2 L 400.2,140.9 M 381.1,162.6 L 389.4,173.9 M 362.9,162.6 L 354.6,173.9 M 357.2,145.2 L 343.8,140.9" fill="none" stroke="#16164F" stroke-width="4.4399999999999995" stroke-linecap="round"/>
    </g>
    <circle cx="372" cy="150" r="37" fill="none" stroke="#16164F" stroke-opacity="0.15" stroke-width="2"/>
  </g>
  </g>
</svg>
