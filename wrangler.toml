# Cloudflare Worker: Cron poller + normaliser → Workers KV, AND serves the frontend.
# The single Worker serves the static /web app via Static Assets and intercepts
# GET /data/latest.json to return the KV snapshot — one deployment, same origin,
# no CORS, no separate Pages project. The frontend only ever reads the snapshot.

name = "worldcuptracker"
main = "worker/index.js"
compatibility_date = "2024-11-01"

# --- Static Assets: serve the /web frontend from this Worker ---
# run_worker_first = true so the Worker runs on every request and can intercept
# /data/latest.json (KV) before the static mock at web/data/latest.json is served.
[assets]
directory = "./web"
binding = "ASSETS"
run_worker_first = true

# --- Workers KV: holds the single normalised snapshot (latest.json) ---
[[kv_namespaces]]
binding = "SNAPSHOT"
id = "616c8be67b784ed7ba4285d426a6762a"

# --- Cron: poll cadence (brief §3) ---
# Baseline every 6h; the Worker self-tightens to ~60-90s when a fixture is live by
# scheduling its own short-lived re-checks (see worker/index.js liveGate()).
# Cron granularity is 1 minute, so we run every minute and the live-gate decides
# whether to actually hit the live endpoints or skip cheaply.
[triggers]
crons = ["* * * * *"]

[vars]
# Verify against the live API before deploying (brief §3).
WC_LEAGUE_ID = "1"          # VERIFY: API-Football league id for the FIFA World Cup
WC_SEASON = "2026"          # VERIFY: season value for WC 2026
BASELINE_INTERVAL_MIN = "360"   # 6h baseline refresh
LIVE_INTERVAL_SEC = "75"        # ~60-90s while live
# Max API subrequests per poll. Keep under the Workers plan cap (Free=50, Paid=1000).
# On Workers Paid: a full poll (~110 calls) fits comfortably, so everything fills in
# a single poll. (On Free, set this to ~45 so heavy enrichment spreads across polls.)
SUBREQUEST_BUDGET = "900"

# APIFOOTBALL_KEY is a secret:  wrangler secret put APIFOOTBALL_KEY
# FOOTBALLDATA_KEY (fallback, optional):  wrangler secret put FOOTBALLDATA_KEY
