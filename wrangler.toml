# Cloudflare Worker: Cron poller + normaliser → Workers KV, AND serves the frontend.
# The single Worker serves the static /web app via Static Assets and intercepts
# GET /data/latest.json to return the KV snapshot — one deployment, same origin,
# no CORS, no separate Pages project. The frontend only ever reads the snapshot.

name = "worldcuptracker"
main = "worker/index.js"
compatibility_date = "2024-11-01"

# --- Static Assets: serve the /web frontend from this Worker ---
# run_worker_first = true so the Worker runs on every request and can intercept
# /data/latest.json (KV) before the static mock at web/data/latest.json is served.
[assets]
directory = "./web"
binding = "ASSETS"
run_worker_first = true

# --- Workers KV: holds the single normalised snapshot (latest.json) ---
[[kv_namespaces]]
binding = "SNAPSHOT"
id = "616c8be67b784ed7ba4285d426a6762a"

# --- Deployment id (for the frontend's self-update check at GET /version) ---
[version_metadata]
binding = "CF_VERSION_METADATA"

# --- Cron: poll cadence (brief §3) ---
# Baseline every 6h; the Worker self-tightens to ~60-90s when a fixture is live by
# scheduling its own short-lived re-checks (see worker/index.js liveGate()).
# Cron granularity is 1 minute, so we run every minute and the live-gate decides
# whether to actually hit the live endpoints or skip cheaply.
[triggers]
crons = ["* * * * *"]

[vars]
# Verify against the live API before deploying (brief §3).
WC_LEAGUE_ID = "1"          # VERIFY: API-Football league id for the FIFA World Cup
WC_SEASON = "2026"          # VERIFY: season value for WC 2026
BASELINE_INTERVAL_MIN = "360"   # 6h baseline refresh
# Live cadence: cron only fires once a minute, so this must sit comfortably BELOW 60
# for a poll to qualify on every tick. At 75 the check "now - lastLive >= 75s" failed
# on the next tick (~60s later) and the poll actually landed every 2 MINUTES — the
# match minute visibly skipped. 45 ⇒ a live poll every cron minute (~6-10 API calls).
LIVE_INTERVAL_SEC = "45"
# Max API subrequests per poll. Keep under the Workers plan cap (Free=50, Paid=1000).
# On Workers Paid: a full poll (~110 calls) fits comfortably, so everything fills in
# a single poll. (On Free, set this to ~45 so heavy enrichment spreads across polls.)
SUBREQUEST_BUDGET = "900"
# News: BBC Sport World Cup RSS (no API-Football quota cost), refreshed ~every 30 min.
NEWS_RSS = "https://feeds.bbci.co.uk/sport/football/world-cup/rss.xml"
NEWS_INTERVAL_MIN = "30"
# UK TV channels ("where to watch"): the published BBC/ITV schedules are re-checked
# daily at ~TV_REFRESH_HOUR UK (plus a 6-hourly retry while upcoming matches lack a
# channel), overlaying the static seed in web/data/tvUK.json. No API quota cost.
TV_SOURCE_URL = "https://www.live-footballontv.com/live-world-cup-football-on-tv.html"
TV_REFRESH_HOUR = "5"
# Web push public key (brief §14). This is PUBLIC by design (it's also handed to the
# browser), so it lives here so a Git deploy can't wipe it. The matching private key
# (VAPID_JWK) and the contact (VAPID_SUBJECT) must be set as SECRETS — secrets survive
# deploys; plaintext dashboard Variables do NOT (this [vars] block replaces them).
VAPID_PUBLIC_KEY = "BPfPUEER1NnhSRaHUktTYQSKKHv6cPVqokU-3iCd1wgk5K8nV13AAj5WLkeiQ0T_oS4C3eX9tpoJJwXq5WUgO40"

# APIFOOTBALL_KEY is a secret:  wrangler secret put APIFOOTBALL_KEY
# FOOTBALLDATA_KEY (fallback, optional):  wrangler secret put FOOTBALLDATA_KEY
# GUARDIAN_KEY (live minute-by-minute commentary, optional): set as a secret/var.
#   Free Open Platform key from open-platform.theguardian.com — text + metadata,
#   5,000 calls/day. Without it, the live Commentary tab simply doesn't appear.
#
# YOUTUBE_API_KEY (match + daily highlights, optional):  wrangler secret put YOUTUBE_API_KEY
#   YouTube Data API v3 key from a Google Cloud project (free: 10,000 quota units/day;
#   search.list = 100 units ⇒ ~100 searches/day). Separate from the API-Football quota.
#   Per finished match: searched on full polls, throttled to ~45 min/match, frozen once
#   found. Daily round-up (morning catch-up): searched ONLY inside the morning window
#   (05:00–13:00 UK), ~every 30 min until found, so it's ready when the view is live and a
#   late-afternoon upload is never used. Without the key, both degrade gracefully to a
#   "Watch on YouTube" search link (finished-match commentary + morning catch-up).
#
# Web push notifications (brief §14) — OPTIONAL. The feature stays inert until set.
#   Generate a key pair once:  npm run gen:vapid
#   VAPID_JWK        (Secret)   — the private-key JWK it prints
#   VAPID_PUBLIC_KEY (Variable) — the base64url public key (also handed to the browser)
#   VAPID_SUBJECT    (Variable) — a mailto: or https: contact, e.g. mailto:you@example.com
